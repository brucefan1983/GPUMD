[pytest]
markers =
    fast: single-point evaluations on small test systems; should complete in well under a minute.
    slow: actual MD runs (conservation tests, larger systems); excluded by default with
        `-m "not slow"`, run explicitly otherwise.
    cross_check: compares GPUNEP output against calorine's CPUNEP as an independent reference
        implementation; still requires a GPU to run the GPUNEP side.
testpaths = .
